<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Better-CTRL-F Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h2>Better-CTRL-F</h2>
    <p>Settings</p>
  </div>
  
  <div class="settings-group">
    <h3 class="section-title">Search Bar</h3>
    
    <div class="setting-item">
      <label for="theme-select">UI Theme</label>
      <select id="theme-select">
        <option value="dark">Dark Mode</option>
        <option value="light">Light Mode</option>
      </select>
    </div>

    <div class="setting-item">
      <label for="neon-toggle">Enable Neon Effect</label>
      <label class="toggle-switch">
        <input type="checkbox" id="neon-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-item">
      <label for="neon-theme-select">Neon Border Style</label>
      <select id="neon-theme-select">
        <option value="cyberpunk">Cyberpunk</option>
        <option value="fire">Fire</option>
        <option value="ocean">Ocean</option>
        <option value="forest">Forest</option>
        <option value="ghost">Monochrome</option>
      </select>
    </div>

    <div class="settings-divider"></div>
    <h3 class="section-title">Color Themes</h3>
    
    <div class="setting-item">
      <label for="highlight-theme-select">Highlight Theme</label>
      <select id="highlight-theme-select">
        <option value="yellow">Yellow (Default)</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
        <option value="purple">Purple</option>
        <option value="pink">Pink</option>
        <option value="red">Red</option>
      </select>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
